---
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
lint:
  disabled:
    - ty
    - prettier
    - pyright
  enabled:
    - grype@0.112.0
    - bandit@1.9.4
    - hadolint@2.14.0
    - sourcery@1.43.0
    - sql-formatter@15.7.3
    - actionlint@1.7.12
    - autopep8@2.3.2
    - black@26.3.1
    - checkov@3.2.526
    - flake8@7.3.0
    - git-diff-check
    - gitleaks@8.30.1
    - isort@8.0.1
    - markdownlint@0.48.0
    - mypy@1.20.2
    - osv-scanner@2.3.6
    - ruff@0.15.12
    - taplo@0.10.0
    - trivy@0.70.0
    - trufflehog@3.95.2
    - yamllint@1.38.0
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
actions:
  enabled:
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-announce
    - trunk-upgrade-available
tools:
  disabled:
    - ty
  runtimes:
    - python
  enabled:
    - circleci@0.1.36202
    - gh@2.92.0
    - pylint@4.0.5
    - shellcheck@0.11.0
    - poetry@2.4.0
  definitions:
    - name: mypy
      runtime: python
      package: mypy
      shims: [mypy]
      extra_packages:
        - typing_extensions
        - psutil
        - requests
        - types-requests
        - lxml
        - icecream
downloads:
  - name: python
    downloads:
      - os:
          macos: apple-darwin
          linux: unknown-linux-gnu
        cpu:
          x86_64: x86_64
          arm_64: aarch64
        url: https://github.com/astral-sh/python-build-standalone/releases/download/20260203/cpython-${version}+20260203-${cpu}-${os}-install_only.tar.gz
        version: 3.10.19
        strip_components: 1
      - os:
          macos: apple-darwin
          linux: unknown-linux-gnu
        cpu:
          x86_64: x86_64
          arm_64: aarch64
        url: https://github.com/astral-sh/python-build-standalone/releases/download/20260203/cpython-${version}+20260203-${cpu}-${os}-install_only.tar.gz
        version: 3.11.14
        strip_components: 1
      - os:
          macos: apple-darwin
          linux: unknown-linux-gnu
        cpu:
          x86_64: x86_64
          arm_64: aarch64
        url: https://github.com/astral-sh/python-build-standalone/releases/download/20260203/cpython-${version}+20260203-${cpu}-${os}-install_only.tar.gz
        version: 3.12.12
        strip_components: 1
      - os:
          macos: apple-darwin
          linux: unknown-linux-gnu
        cpu:
          x86_64: x86_64
          arm_64: aarch64
        url: https://github.com/astral-sh/python-build-standalone/releases/download/20260203/cpython-${version}+20260203-${cpu}-${os}-install_only.tar.gz
        version: 3.13.12
        strip_components: 1
      - os:
          macos: apple-darwin
          linux: unknown-linux-gnu
        cpu:
          x86_64: x86_64
          arm_64: aarch64
        url: https://github.com/astral-sh/python-build-standalone/releases/download/20260203/cpython-${version}+20260203-${cpu}-${os}-install_only.tar.gz
        version: 3.14.3
        strip_components: 1
